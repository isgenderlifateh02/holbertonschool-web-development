<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmileSchool - Get Schooled</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="logo">
            <span class="logo-icon">習</span>
            <span class="logo-text">SmileSchool</span>
        </div>
        <nav>
            <a href="#">COURSES</a>
            <a href="#">PRICING</a>
            <a href="#">LOGIN</a>
        </nav>
    </header>

    <main>
        <section class="hero">
            <h1>Get schooled</h1>
            <div class="keywords">
                <span>SMILES</span>
                <span>GRIN</span>
                <span>LAUGH</span>
            </div>
            <button class="btn">REGISTER FOR FREE</button>
        </section>

        <section class="pros">
            <h2><span class="purple">Learn</span> from the pros</h2>
            
            <div class="container">
                <div class="card">
                    <img src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?auto=format&fit=crop&w=150&h=150&q=80" alt="Phillip Massey">
                    <h3>Phillip Massey</h3>
                    <p>« Smile of the year »</p>
                    <span>2018 - 2019</span>
                </div>
                <div class="card">
                    <img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?auto=format&fit=crop&w=150&h=150&q=80" alt="Nannie Lawrence">
                    <h3>Nannie Lawrence</h3>
                    <p>Best « little smile »</p>
                    <span>2017</span>
                </div>
                <div class="card">
                    <img src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e?auto=format&fit=crop&w=150&h=150&q=80" alt="Bruce Walters">
                    <h3>Bruce Walters</h3>
                    <p>Best « Friend Smile »</p>
                    <span>live performance 2019</span>
                </div>
                <div class="card">
                    <img src="https://images.unsplash.com/photo-1539571696357-5a69c17a67c6?auto=format&fit=crop&w=150&h=150&q=80" alt="Henry Hughes">
                    <h3>Henry Hughes</h3>
                    <p>« 24h smiles » winner</p>
                    <span>2016 - 2019</span>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
