<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmileSchool - Get Schooled</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="header">
        <div class="logo">
            <span class="logo-icon">習</span>
            <span class="logo-text">SmileSchool</span>
        </div>
        <nav class="nav">
            <a href="#" class="nav-link">COURSES</a>
            <a href="#" class="nav-link">PRICING</a>
            <a href="#" class="nav-link">LOGIN</a>
        </nav>
    </header>

    <main>
        <section class="hero-section">
            <div class="hero-content">
                <h1 class="hero-title">Get schooled</h1>
                
                <div class="keywords-row">
                    <span>SMILES</span>
                    <span>GRIN</span>
                    <span>LAUGH</span>
                </div>

                <button class="cta-button">REGISTER FOR FREE</button>
            </div>
        </section>

        <section class="pros-section">
            <h2 class="section-subtitle"><span class="purple-text">Learn</span> from the pros</h2>
            
            <div class="profiles-container">
                <div class="profile-card">
                    <div class="avatar-container">
                        <img src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?auto=format&fit=crop&w=150&h=150&q=80" alt="Phillip Massey" class="profile-img">
                    </div>
                    <h3 class="profile-name">Phillip Massey</h3>
                    <p class="profile-desc">« Smile of the year »</p>
                    <p class="profile-year">2018 - 2019</p>
                </div>

                <div class="profile-card">
                    <div class="avatar-container">
                        <img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?auto=format&fit=crop&w=150&h=150&q=80" alt="Nannie Lawrence" class="profile-img">
                    </div>
                    <h3 class="profile-name">Nannie Lawrence</h3>
                    <p class="profile-desc">Best « little smile »</p>
                    <p class="profile-year">2017</p>
                </div>

                <div class="profile-card">
                    <div class="avatar-container">
                        <img src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e?auto=format&fit=crop&w=150&h=150&q=80" alt="Bruce Walters" class="profile-img">
                    </div>
                    <h3 class="profile-name">Bruce Walters</h3>
                    <p class="profile-desc">Best « Friend Smile »</p>
                    <p class="profile-year">live performance 2019</p>
                </div>

                <div class="profile-card">
                    <div class="avatar-container">
                        <img src="https://images.unsplash.com/photo-1539571696357-5a69c17a67c6?auto=format&fit=crop&w=150&h=150&q=80" alt="Henry Hughes" class="profile-img">
                    </div>
                    <h3 class="profile-name">Henry Hughes</h3>
                    <p class="profile-desc">« 24h smiles » winner</p>
                    <p class="profile-year">2016 - 2019</p>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
