<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Get Schooled</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:ital,wght@0,400;0,600;0,700;1,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <div class="logo">
        <img src="images/logo.png" alt="Logo" />
      </div>
      <nav>
        <ul>
          <li><a href="#">COURSES</a></li>
          <li><a href="#">PRICING</a></li>
          <li><a href="#">LOGIN</a></li>
        </ul>
      </nav>
    </header>

    <main>
      <section class="hero">
        <h1>Get schooled</h1>
        <div class="keywords">
          <span>SMILES</span>
          <span>GRIN</span>
          <span>LAUGH</span>
        </div>
        <button>REGISTER FOR FREE</button>
      </section>

      <section class="pros">
        <h2><span>Learn</span> from the pros</h2>
        <div class="container">
          <div class="card">
            <img src="images/pic_1.jpg" alt="Lawson Bass" />
            <h3>Lawson Bass</h3>
            <p>Instructor</p>
            <span>★★★★★</span>
          </div>
          <div class="card">
            <img src="images/pic_2.jpg" alt="Carr Walton" />
            <h3>Carr Walton</h3>
            <p>Instructor</p>
            <span>★★★★★</span>
          </div>
          <div class="card">
            <img src="images/pic_3.jpg" alt="Virginia Beard" />
            <h3>Virginia Beard</h3>
            <p>Instructor</p>
            <span>★★★★★</span>
          </div>
          <div class="card">
            <img src="images/pic_4.jpg" alt="William Butler" />
            <h3>William Butler</h3>
            <p>Instructor</p>
            <span>★★★★★</span>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
